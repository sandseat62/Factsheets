<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Chosen Palette: Gracewired Brand Colors (Navy Blue, Vibrant Orange, Charcoal, Off-White) -->
    <!-- Application Structure Plan: The SPA uses a dashboard layout with a persistent sidebar (or top nav on mobile) allowing users to freely explore the 6 distinct 'Digital Fronts' (Social Media, Pornography, Shopping, Gaming, Doomscrolling, Betting). This non-linear structure prioritizes user autonomy, letting congregants immediately access the specific topic they need help with. Each section follows a consistent, pedagogical flow: Context (Intro/History) -> Data (Interactive Chart) -> Impact (Brain/Kids) -> Action (Interactive Checklist). This ensures the complex neurobiological and algorithmic concepts from the report are broken down into digestible, actionable steps, moving the user from understanding to practical application. -->
    <!-- Visualization & Content Choices: 
    1. Social Media -> Goal: Compare addiction rates -> Viz: Bar Chart (Chart.js) -> Interaction: Hover tooltips -> Justification: Clearly shows youth vulnerability. 
    2. Pornography -> Goal: Inform on exposure -> Viz: Donut Chart (Chart.js) -> Interaction: Hover -> Justification: Highlights the massive scale of accidental exposure.
    3. Shopping -> Goal: Show market scale -> Viz: Half-Doughnut (Chart.js) -> Interaction: Hover -> Justification: Visualizes the trillion-dollar scale of the click trap.
    4. Gaming -> Goal: Show mental health risk over time -> Viz: Line Chart (Chart.js) -> Interaction: Hover points -> Justification: Demonstrates the '3-hour tipping point' clearly.
    5. Doomscrolling -> Goal: Highlight sleep/time loss -> Viz: Horizontal Bar (Chart.js) -> Interaction: Hover -> Justification: Emphasizes passive time consumption.
    6. Betting -> Goal: Compare spender types -> Viz: Logarithmic Bar Chart (Chart.js) -> Interaction: Hover -> Justification: Exposes the massive disparity of 'Whale' spending. 
    Action Plans -> Goal: Change behavior -> Viz: Interactive HTML Checklists -> Interaction: Click to strikethrough -> Justification: Provides immediate psychological reward for setting boundaries. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sand: '#f8fafc', /* Slate 50 - Clean off-white */
                        stone: '#0f172a', /* Slate 900 - Dark charcoal for text */

                        alert: '#ea580c', /* Vibrant Orange for alerts and accents */

                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        serif: ['Merriweather', 'ui-serif', 'Georgia', 'serif'],

        body {
            background-color: #f8fafc;

        }

            color: #16a34a;
        }

            animation: fadeIn 0.4s ease-in-out;

                            <p class="text-stone-700 text-sm">You absolutely do not have to figure all this out on your own! Addiction of any kind thrives in isolation and shame. We are committed to high trust, total support, absolute grace, and the unwavering truth of the Gospel.</p>
                        </div>

                `,

            social: {

                icon: "📱",

            gaming: {

                icon: "🎮",
                intro: "Video games aren't just an occasional rainy-day hobby anymore! They've become the main social hangout spot for today's youth. While creative play is healthy, modern digital gaming is designed to literally never end, capturing a child's attention and turning innocent play into an endless loop of anxiety.",

                algorithms: "Games use a 'Live Economy.' In-game events and rewards are strictly timed. If a player doesn't log in on a specific day, they permanently miss out on a digital reward. This drives intense Fear Of Missing Out (FOMO) and ensures the video game dictates the family's daily schedule!",

                impactText: "Continuous, fast-paced gaming replaces calm focus with constant restlessness, exhausting the brain's reward centers. Modern games feature 'loot boxes'—digital slot machines with flashing lights—grooming young minds for gambling. Professional gamers also drive a toxic culture of 'Status Spending' on digital outfits.",
                chartConfig: {
                    type: 'line',
                    data: {
                        labels: ['1 Hour', '2 Hours', '3 Hours (Tipping Point)', '4 Hours', '5+ Hours'],
                        datasets: [{
                            label: 'Depression/Anxiety Risk Multiplier',
                            data: [1, 1.2, 3.0, 3.8, 4.5],

                            pointRadius: 6,
                            pointBackgroundColor: '#1e3a8a'

                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            title: { display: true, text: 'Mental Health Risk vs. Daily Play Time', font: { size: 16 } }

                        scales: { y: { beginAtZero: true } }

                actions: [

                    "Keep Gaming Public: Keep all gaming consoles and computers in common areas like the living room.",

                chartConfig: {
                    type: 'bar',
                    data: {

                        datasets: [{
                            label: '% of Demographic',
                            data: [38, 46],
                            backgroundColor: ['#1e3a8a', '#ea580c'],

                        }]

                        maintainAspectRatio: false,

                actions: [

                icon: "🎰",
                intro: "Gambling isn't just an activity stuck in a physical building in Las Vegas anymore! The casino is now a high-powered app sitting right in your pocket. By removing all physical and social barriers to betting, apps have created a fast-paced financial crisis devastating families in total secrecy.",
                history: "For generations, gambling had natural friction. Back in 1990, you had to drive to an ATM, get cash, go to a casino, and place a bet in front of other people. By 2026, betting apps have erased those stop signs. Now, it's a completely frictionless environment accessible instantly via FaceID.",
                algorithms: "Modern sportsbooks use real-time data to push perfectly timed offers. If you lose a string of bets, the app immediately triggers a 'Loss-Trap' notification offering a free bonus bet! They also promote 'Micro-Betting'—betting on every single pitch or penalty kick.",

                impactText: "Using FaceID and seeing funds as digital points creates 'Digital Numbing'—losing money feels like losing points in a video game. The rapid pace of micro-betting creates hundreds of quick dopamine hits, completely hijacking your brain's reward center. Plus, kids are groomed for this via video game Loot Boxes.",
                chartConfig: {
                    type: 'bar',

                    options: {

                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },

                        scales: {

        let currentChart = null;

        function renderChecklist(actions) {
            return actions.map((action, index) => `
                <div class="checklist-item flex items-start gap-3 p-3 rounded-lg hover:bg-stone-50 transition-colors cursor-pointer border border-transparent hover:border-stone-200" onclick="toggleCheck(this)">
                    <div class="flex-shrink-0 mt-0.5 text-stone-300 check-icon transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <p class="text-stone-700 leading-snug transition-colors select-none">${action}</p>
                </div>
            `).join('');
        }

        function toggleCheck(element) {
            element.classList.toggle('checked');
        }

        function renderSection(key) {
            const data = appData[key];
            const mainContent = document.getElementById('main-content');
            
            if (key === 'welcome') {
                mainContent.innerHTML = `
                    <div class="fade-in max-w-4xl mx-auto">
                        <h2 class="text-4xl font-serif font-bold text-stone-800 mb-6 flex items-center gap-3">
                            <span>${data.icon}</span> ${data.title}
                        </h2>
                        <p class="text-xl text-stone-600 leading-relaxed mb-10">${data.intro}</p>
                        ${data.content}
                    </div>
                `;
                if(currentChart) currentChart.destroy();
                return;
            }

            mainContent.innerHTML = `
                <div class="fade-in max-w-5xl mx-auto">
                    <header class="mb-10 border-b border-stone-200 pb-8">
                        <h2 class="text-4xl font-serif font-bold text-stone-800 mb-4 flex items-center gap-3">
                            <span class="text-trust bg-trust/10 p-2 rounded-xl">${data.icon}</span> ${data.title}
                        </h2>
                        <p class="text-xl text-stone-600 leading-relaxed">${data.intro}</p>
                    </header>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
                        <div class="space-y-8">
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-200">
                                <h3 class="text-lg font-bold text-trust mb-3 uppercase tracking-wide text-sm">The Shift: How We Got Here</h3>
                                <p class="text-stone-700 leading-relaxed mb-4">${data.history}</p>
                                <div class="bg-stone-50 p-4 rounded-lg border border-stone-100">
                                    <h4 class="font-bold text-stone-800 mb-2">The Algorithmic Trap</h4>
                                    <p class="text-stone-600 text-sm leading-relaxed">${data.algorithms}</p>
                                </div>
                            </div>
                            
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-200">
                                <h3 class="text-lg font-bold text-alert mb-3 uppercase tracking-wide text-sm">${data.impactTitle}</h3>
                                <p class="text-stone-700 leading-relaxed">${data.impactText}</p>
                            </div>
                        </div>

                        <div class="space-y-8">
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-200 flex flex-col h-full">
                                <h3 class="text-lg font-bold text-stone-800 mb-4 uppercase tracking-wide text-sm">Data Explorer</h3>
                                <div class="chart-container flex-grow">
                                    <canvas id="sectionChart"></canvas>
                                </div>
                                <p class="text-xs text-center text-stone-400 mt-4 italic">Interactive Visualization - Hover for details</p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-8 rounded-xl shadow-sm border border-trust border-t-4 mb-10">
                        <h3 class="text-2xl font-serif font-bold text-stone-800 mb-2">Action Plan: Digital Shields</h3>
                        <p class="text-stone-500 mb-6">Click items to mark them as completed and build your boundaries.</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-2">
                            ${renderChecklist(data.actions)}
                        </div>
                    </div>
                </div>
            `;

            if (currentChart) {
                currentChart.destroy();
            }

            const ctx = document.getElementById('sectionChart').getContext('2d');
            currentChart = new Chart(ctx, data.chartConfig);
        }

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'bg-trust', 'text-white'));
                
                const target = e.currentTarget;
                target.classList.add('active');
                
                if (window.innerWidth < 768) {
                    const navContainer = document.getElementById('nav-container');
                    navContainer.scrollLeft = target.offsetLeft - 20;
                }

                renderSection(target.dataset.target);
            });
        });

        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = '#334155';
        
        renderSection('welcome');
    </script>
</body>
</html>
